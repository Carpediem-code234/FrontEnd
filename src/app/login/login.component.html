<h2 class="text-2xl font-bold text-gray-800 mb-6">Iniciar sesión</h2>

<form id="login-form" class="space-y-5">
    <div class="input-container">
        <input type="email" id="login-email" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
        <label for="login-email" class="floating-label">Correo electrónico</label>
    </div>

    <div class="input-container">
        <input type="password" id="login-password" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
        <label for="login-password" class="floating-label">Contraseña</label>
    </div>

    <div class="flex items-center justify-between">
        <div class="flex items-center">
            <input type="checkbox" id="remember-me" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-700">Recordarme</label>
        </div>
        <a href="#" class="text-sm text-purple-600 hover:text-purple-800">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" class="w-full btn-primary text-white py-3 px-4 rounded-lg font-medium">
        Iniciar sesión
    </button>
</form>

<div class="mt-6">
    <p class="text-center text-gray-600">O inicia sesión con</p>
    <div class="flex justify-center space-x-4 mt-4">
        <button class="social-btn w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center">
            <i class="fab fa-facebook-f"></i>
        </button>
        <button class="social-btn w-10 h-10 bg-red-600 text-white rounded-full flex items-center justify-center">
            <i class="fab fa-google"></i>
        </button>
        <button class="social-btn w-10 h-10 bg-black text-white rounded-full flex items-center justify-center">
            <i class="fab fa-apple"></i>
        </button>
    </div>
</div>

<p class="text-center mt-6 text-gray-600">
    ¿No tienes una cuenta?
    <button id="show-register" class="text-purple-600 font-medium hover:text-purple-800">Regístrate</button>
</p>
