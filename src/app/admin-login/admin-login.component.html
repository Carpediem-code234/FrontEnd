<h2 class="text-2xl font-bold text-gray-800 mb-6">Acceso administrador</h2>

<form id="admin-login-form" class="space-y-5">
    <div class="input-container">
        <input type="text" id="admin-username" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
        <label for="admin-username" class="floating-label">Usuario</label>
    </div>

    <div class="input-container">
        <input type="password" id="admin-password" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
        <label for="admin-password" class="floating-label">Contraseña</label>
    </div>

    <div class="flex items-center">
        <input type="checkbox" id="admin-remember" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
        <label for="admin-remember" class="ml-2 block text-sm text-gray-700">Recordar credenciales</label>
    </div>

    <button type="submit" class="w-full btn-primary text-white py-3 px-4 rounded-lg font-medium">
        Acceder al panel
    </button>
</form>

<div class="mt-6 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
    <div class="flex">
        <div class="flex-shrink-0">
            <i class="fas fa-exclamation-circle text-yellow-500"></i>
        </div>
        <div class="ml-3">
            <h3 class="text-sm font-medium text-yellow-800">Acceso restringido</h3>
            <div class="mt-2 text-sm text-yellow-700">
                <p>Esta área es solo para personal autorizado de la peluquería.</p>
            </div>
        </div>
    </div>
</div>
