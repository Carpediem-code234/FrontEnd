<h2 class="text-2xl font-bold text-gray-800 mb-6">Crear cuenta</h2>

<form id="register-form" class="space-y-5">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-container">
            <input type="text" id="register-firstname" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
            <label for="register-firstname" class="floating-label">Nombre</label>
        </div>

        <div class="input-container">
            <input type="text" id="register-lastname" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
            <label for="register-lastname" class="floating-label">Apellido</label>
        </div>
    </div>

    <div class="input-container">
        <input type="email" id="register-email" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
        <label for="register-email" class="floating-label">Correo electrónico</label>
    </div>

    <div class="input-container">
        <input type="tel" id="register-phone" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" ">
        <label for="register-phone" class="floating-label">Teléfono (opcional)</label>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-container">
            <input type="password" id="register-password" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
            <label for="register-password" class="floating-label">Contraseña</label>
        </div>

        <div class="input-container">
            <input type="password" id="register-confirm" class="w-full px-4 py-3 border rounded-lg input-focus focus:outline-none" placeholder=" " required>
            <label for="register-confirm" class="floating-label">Confirmar contraseña</label>
        </div>
    </div>

    <div class="flex items-center">
        <input type="checkbox" id="accept-terms" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded" required>
        <label for="accept-terms" class="ml-2 block text-sm text-gray-700">
            Acepto los <a href="#" class="text-purple-600 hover:text-purple-800">Términos de servicio</a> y
            <a href="#" class="text-purple-600 hover:text-purple-800">Política de privacidad</a>
        </label>
    </div>

    <button type="submit" class="w-full btn-primary text-white py-3 px-4 rounded-lg font-medium">
        Registrarse
    </button>
</form>

<p class="text-center mt-6 text-gray-600">
    ¿Ya tienes una cuenta?
    <button id="show-login" class="text-purple-600 font-medium hover:text-purple-800">Inicia sesión</button>
</p>
